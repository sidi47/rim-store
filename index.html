<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rim Store - ريم ستور</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- بداية كود Rim Store من ملفك الأصلي ---
        const RimStore = () => {
          const [activeTab, setActiveTab] = useState('home');
          const [searchQuery, setSearchQuery] = useState('');
          const [cart, setCart] = useState([]);
          const [showCart, setShowCart] = useState(false);

          const categories = [
            { id: 'all', name: 'الكل', icon: 'fa-th-large' },
            { id: 'men', name: 'رجالي', icon: 'fa-mars' },
            { id: 'women', name: 'نسائي', icon: 'fa-venus' },
            { id: 'kids', name: 'أطفال', icon: 'fa-child' }
          ];

          const products = [
            { id: 1, name: 'طقم رجالي كاجوال', price: 1200, category: 'men', image: '/api/placeholder/200/200', rating: 4.5 },
            { id: 2, name: 'فستان سهرة ناعم', price: 2500, category: 'women', image: '/api/placeholder/200/200', rating: 4.8 },
            { id: 3, name: 'بدلة أطفال شتوية', price: 850, category: 'kids', image: '/api/placeholder/200/200', rating: 4.2 },
            { id: 4, name: 'حذاء رياضي عصري', price: 1100, category: 'men', image: '/api/placeholder/200/200', rating: 4.6 },
            { id: 5, name: 'حقيبة يد نسائية', price: 950, category: 'women', image: '/api/placeholder/200/200', rating: 4.7 },
            { id: 6, name: 'قميص رجالي رسمي', price: 750, category: 'men', image: '/api/placeholder/200/200', rating: 4.4 }
          ];

          const addToCart = (product) => {
            setCart([...cart, { ...product, cartId: Date.now() }]);
          };

          const removeFromCart = (cartId) => {
            setCart(cart.filter(item => item.cartId !== cartId));
          };

          const filteredProducts = products.filter(p => 
            (activeTab === 'all' || p.category === activeTab) &&
            p.name.toLowerCase().includes(searchQuery.toLowerCase())
          );

          return (
            <div className="min-h-screen bg-gray-50 pb-20 font-sans">
              {/* الهيدر والبحث */}
              <header className="bg-white p-4 sticky top-0 z-10 shadow-sm">
                <div className="max-w-md mx-auto flex items-center justify-between gap-4">
                  <div className="relative flex-1">
                    <input 
                      type="text" 
                      placeholder="بحث عن منتجات..." 
                      className="w-full bg-gray-100 border-none rounded-full py-2 px-10 focus:ring-2 focus:ring-blue-500"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                    <i className="fa fa-search absolute right-4 top-3 text-gray-400"></i>
                  </div>
                  <button onClick={() => setShowCart(true)} className="relative p-2">
                    <i className="fa fa-shopping-bag text-2xl text-gray-700"></i>
                    {cart.length > 0 && (
                      <span className="absolute top-0 left-0 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
                        {cart.length}
                      </span>
                    )}
                  </button>
                </div>
              </header>

              {/* الأقسام */}
              <div className="p-4 overflow-x-auto">
                <div className="flex gap-4 max-w-md mx-auto">
                  {categories.map(cat => (
                    <button 
                      key={cat.id}
                      onClick={() => setActiveTab(cat.id)}
                      className={`flex flex-col items-center min-w-[70px] p-2 rounded-xl transition ${activeTab === cat.id ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-gray-600'}`}
                    >
                      <i className={`fa ${cat.icon} mb-1`}></i>
                      <span className="text-xs font-bold">{cat.name}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* المنتجات */}
              <main className="max-w-md mx-auto p-4 grid grid-cols-2 gap-4">
                {filteredProducts.map(product => (
                  <div key={product.id} className="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 flex flex-col">
                    <img src={product.image} alt={product.name} className="w-full h-40 object-cover" />
                    <div className="p-3 flex-1 flex flex-col">
                      <h3 className="text-sm font-bold text-gray-800 line-clamp-1 mb-1">{product.name}</h3>
                      <div className="flex items-center text-xs text-yellow-500 mb-2">
                        <i className="fa fa-star"></i>
                        <span className="mr-1 text-gray-500 font-bold">{product.rating}</span>
                      </div>
                      <div className="flex items-center justify-between mt-auto">
                        <span className="text-blue-600 font-bold text-sm">{product.price} ر.س</span>
                        <button onClick={() => addToCart(product)} className="bg-gray-100 text-gray-800 h-8 w-8 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition">
                          <i className="fa fa-plus"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </main>

              {/* سلة التسوق (Overlay) */}
              {showCart && (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-end">
                  <div className="bg-white w-full max-w-xs h-full p-6 flex flex-col">
                    <div className="flex items-center justify-between mb-6">
                      <h2 className="text-xl font-bold">سلتك</h2>
                      <button onClick={() => setShowCart(false)} className="text-gray-500 hover:text-red-500">
                        <i className="fa fa-times text-xl"></i>
                      </button>
                    </div>
                    <div className="flex-1 overflow-y-auto">
                      {cart.length === 0 ? (
                        <p className="text-center text-gray-500 mt-10 italic">السلة فارغة حالياً</p>
                      ) : (
                        cart.map(item => (
                          <div key={item.cartId} className="flex items-center gap-3 mb-4 bg-gray-50 p-2 rounded-lg">
                            <img src={item.image} className="w-12 h-12 rounded-lg" />
                            <div className="flex-1">
                              <h4 className="text-xs font-bold">{item.name}</h4>
                              <p className="text-blue-600 text-xs">{item.price} ر.س</p>
                            </div>
                            <button onClick={() => removeFromCart(item.cartId)} className="text-red-400 px-2">
                              <i className="fa fa-trash-alt"></i>
                            </button>
                          </div>
                        ))
                      )}
                    </div>
                    {cart.length > 0 && (
                      <div className="mt-6 border-t pt-4">
                        <div className="flex justify-between font-bold text-lg mb-4">
                          <span>الإجمالي:</span>
                          <span>{cart.reduce((sum, item) => sum + item.price, 0)} ر.س</span>
                        </div>
                        <button className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">إتمام الطلب</button>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        };

        // --- تشغيل التطبيق في صفحة الويب ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RimStore />);
    </script>
</body>
</html>
