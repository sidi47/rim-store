<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#c9a84c;--g2:#f0d060;--gd:#8a6f20;--red:#e63946;--green:#22c55e;--warn:#f59e0b;--blue:#3b82f6;--bg:#07070e;--s1:#0f0f18;--s2:#171724;--s3:#1e1e2e;--s4:#252538;--txt:#ede8d8;--mut:#6b6457;--bdr:rgba(201,168,76,0.13);--bdr2:rgba(201,168,76,0.25);}
body{background:var(--bg);color:var(--txt);font-family:'Cairo',sans-serif;direction:rtl;min-height:100vh}
.nav{background:rgba(7,7,14,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:400}
.logo{font-family:'Tajawal';font-size:24px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--g),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;user-select:none}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-pill{background:var(--red);color:#fff;padding:4px 13px;border-radius:20px;font-size:11px;font-weight:800;animation:pulse 1.8s infinite}
.nav-cat-pill{background:rgba(201,168,76,0.1);border:1px solid var(--bdr2);color:var(--g);padding:4px 13px;border-radius:20px;font-size:11px;font-weight:700}
.hero-banner{background:linear-gradient(135deg,#07070e 0%,#0f0f1e 50%,#07070e 100%);padding:60px 24px 50px;text-align:center;position:relative;overflow:hidden}
.hero-banner::before{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none}
.hero-banner::after{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(201,168,76,0.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.hb-tag{display:inline-block;background:rgba(201,168,76,0.08);border:1px solid var(--bdr2);color:var(--g);padding:5px 18px;border-radius:30px;font-size:12px;font-weight:700;margin-bottom:18px;letter-spacing:2px;position:relative;z-index:1}
.hb-title{font-family:'Tajawal';font-size:clamp(32px,6vw,60px);font-weight:900;line-height:1.15;margin-bottom:12px;position:relative;z-index:1;background:linear-gradient(135deg,#fff 30%,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hb-sub{color:var(--mut);font-size:15px;max-width:480px;margin:0 auto 30px;line-height:1.7;position:relative;z-index:1}
.hb-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;position:relative;z-index:1}
.hbs{text-align:center}.hbs-n{font-family:'Tajawal';font-size:28px;font-weight:900;color:var(--g)}.hbs-l{font-size:11px;color:var(--mut);margin-top:2px}
.cat-bar{padding:24px 24px 0;max-width:1300px;margin:0 auto}
.cat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--mut);padding:8px 18px;border-radius:30px;font-family:'Cairo';font-size:13px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0}
.cat-btn:hover{border-color:var(--bdr2);color:var(--g)}.cat-btn.on{background:rgba(201,168,76,0.12);border-color:var(--g);color:var(--g);font-weight:800}
.store-section{max-width:1300px;margin:0 auto;padding:28px 24px 60px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.sec-ttl{font-family:'Tajawal';font-size:20px;font-weight:900;display:flex;align-items:center;gap:8px}
.sec-count{color:var(--mut);font-size:13px;font-weight:400}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}
.pcard{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;overflow:hidden;transition:all .35s;cursor:pointer;position:relative}
.pcard:hover{border-color:var(--bdr2);transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.5)}
.pcard-imgs{position:relative;height:220px;overflow:hidden;background:var(--s2)}
.pcard-img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.pcard:hover .pcard-img{transform:scale(1.06)}
.pcard-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;padding:4px 11px;border-radius:16px;font-size:11px;font-weight:800;z-index:2}
.pcard-cat{position:absolute;top:10px;left:10px;background:rgba(7,7,14,0.75);backdrop-filter:blur(8px);padding:4px 10px;border-radius:14px;font-size:11px;color:var(--g);font-weight:700;z-index:2}
.pcard-stock-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--s3)}
.pcard-stock-fill{height:100%;background:linear-gradient(to left,var(--red),#ff7070);transition:width .5s}
.pcard-body{padding:18px}
.pcard-name{font-size:16px;font-weight:800;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:12px;color:var(--mut);margin-bottom:10px}
.pcard-pricing{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pcard-price{font-family:'Tajawal';font-size:22px;font-weight:900;color:var(--g)}
.pcard-old{font-size:14px;color:var(--mut);text-decoration:line-through}
.pcard-disc{background:rgba(230,57,70,0.14);border:1px solid rgba(230,57,70,0.28);color:var(--red);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:800}
.pcard-stock-lbl{font-size:11px;color:var(--mut);margin-bottom:10px}
.pcard-btn{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:#07070e;border:none;padding:11px;border-radius:11px;font-family:'Cairo';font-size:14px;font-weight:900;cursor:pointer;transition:.3s}
.pcard-btn:hover{opacity:.88;transform:scale(1.02)}
.detail-page{max-width:1100px;margin:0 auto;padding:36px 20px 60px}
.back-btn{display:inline-flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--bdr);color:var(--mut);padding:8px 16px;border-radius:30px;font-size:13px;cursor:pointer;transition:.2s;margin-bottom:28px;font-family:'Cairo'}
.back-btn:hover{border-color:var(--bdr2);color:var(--g)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:start}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr;gap:22px}}
.gal-main{border-radius:18px;overflow:hidden;background:var(--s2);border:1px solid var(--bdr);aspect-ratio:1;position:relative}
.gal-main img{width:100%;height:100%;object-fit:cover;display:block}
.gal-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(7,7,14,0.65);border:1px solid var(--bdr2);color:var(--g);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:5}
.gal-arrow:hover{background:rgba(201,168,76,0.2)}.gal-arrow.prev{right:10px}.gal-arrow.next{left:10px}
.gal-dots{display:flex;justify-content:center;gap:7px;margin-top:12px}
.gal-dot{width:8px;height:8px;border-radius:50%;background:var(--s4);cursor:pointer;transition:.2s;border:1px solid var(--bdr)}
.gal-dot.on{background:var(--g);transform:scale(1.2)}
.gal-thumbs{display:flex;gap:9px;margin-top:10px;overflow-x:auto}
.gal-thumb{width:68px;height:68px;border-radius:10px;object-fit:cover;border:2px solid transparent;cursor:pointer;transition:.2s;opacity:.5;flex-shrink:0}
.gal-thumb.on{border-color:var(--g);opacity:1}
.d-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.08);border:1px solid var(--bdr2);color:var(--g);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:14px}
.d-name{font-family:'Tajawal';font-size:clamp(22px,4vw,36px);font-weight:900;line-height:1.2;margin-bottom:6px}
.d-sub{color:var(--mut);font-size:14px;margin-bottom:18px}
.d-pricing{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.d-price{font-family:'Tajawal';font-size:42px;font-weight:900;color:var(--g)}
.d-old{font-size:20px;color:var(--mut);text-decoration:line-through}
.d-save{background:rgba(230,57,70,0.14);border:1px solid rgba(230,57,70,0.28);color:var(--red);padding:3px 10px;border-radius:8px;font-size:13px;font-weight:800}
.cbar{background:linear-gradient(135deg,#140808,#1e0d0d);border:1px solid rgba(230,57,70,0.22);border-radius:12px;padding:12px 16px;margin:14px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.cbar-lbl{color:#fca5a5;font-size:12px;font-weight:700;white-space:nowrap}
.ctimer{display:flex;align-items:center;gap:5px}
.cunit{background:rgba(230,57,70,0.18);border:1px solid rgba(230,57,70,0.32);border-radius:7px;padding:3px 8px;min-width:40px;text-align:center}
.cnum{font-size:18px;font-weight:900;color:var(--red);font-family:'Tajawal';line-height:1.1}
.clbl{font-size:9px;color:#fca5a5}.csep{color:var(--red);font-size:16px;font-weight:900}
.sbar{background:var(--s2);border:1px solid rgba(230,57,70,0.18);border-radius:10px;padding:10px 14px;margin:12px 0}
.sbar-lbl{font-size:12px;color:#fca5a5;margin-bottom:6px;font-weight:700}
.strack{background:var(--s3);border-radius:4px;height:7px;overflow:hidden}
.sfill{background:linear-gradient(to left,var(--red),#ff7070);height:100%;border-radius:4px}
.d-desc-box{background:var(--s2);border:1px solid var(--bdr);border-right:3px solid var(--g);border-radius:12px;padding:14px 16px;margin:14px 0;font-size:14px;color:#9994a8;line-height:1.8}
.d-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.d-feat{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:13px}
.d-feat-ic{color:var(--g);font-weight:900}
.d-cta{width:100%;background:linear-gradient(135deg,var(--red),#c1121f);color:#fff;border:none;padding:17px;border-radius:13px;font-family:'Cairo';font-size:18px;font-weight:900;cursor:pointer;transition:all .3s;box-shadow:0 8px 28px rgba(230,57,70,0.38);margin-top:4px}
.d-cta:hover{transform:translateY(-3px);box-shadow:0 14px 38px rgba(230,57,70,0.52)}
.d-trust{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.d-trust-i{font-size:12px;color:var(--mut)}
.rvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:20px}
.rvc{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:18px}
.rvh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rva{font-size:30px}.rvn{font-weight:700;font-size:13px}.rv-stars{color:#f59e0b;font-size:13px}.rvt{color:var(--mut);font-size:12px;line-height:1.7}
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);z-index:600;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@media(min-width:600px){.mov{align-items:center;padding:20px}}
.modal{background:var(--s1);border:1px solid var(--bdr);border-radius:22px 22px 0 0;padding:28px 22px 36px;width:100%;max-width:460px;animation:slideUp .3s ease;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:22px}}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mttl{font-family:'Tajawal';font-size:19px;font-weight:900;color:var(--g)}
.mclose{background:rgba(255,255,255,0.06);border:none;color:var(--mut);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.mclose:hover{background:rgba(255,255,255,0.12);color:var(--txt)}
.mprod{display:flex;align-items:center;gap:12px;background:var(--s2);border-radius:12px;padding:12px;margin-bottom:18px}
.mpi{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.mpn{font-weight:800;font-size:14px}.mpp{color:var(--g);font-weight:900;font-size:17px;margin-top:3px}
.flbl{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:7px;display:block}
.fin{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:11px;padding:13px 15px;color:var(--txt);font-family:'Cairo';font-size:14px;outline:none;transition:.2s;margin-bottom:12px}
.fin:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,0.08)}
.fin::placeholder{color:#333345}
.ferr{color:var(--red);font-size:11px;margin:-8px 0 10px}
.fsub{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:#07070e;border:none;padding:15px;border-radius:12px;font-family:'Cairo';font-size:16px;font-weight:900;cursor:pointer;transition:all .3s;margin-top:4px}
.fsub:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,168,76,0.3)}
.succ{text-align:center;padding:16px}
.succ-ic{font-size:70px;animation:bounceIn .5s ease;margin-bottom:14px}
.succ-ttl{font-family:'Tajawal';font-size:22px;font-weight:900;color:var(--green);margin-bottom:8px}
.succ-msg{color:var(--mut);font-size:13px;line-height:1.85;margin-bottom:22px}
.succ-back{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:#07070e;border:none;padding:14px;border-radius:12px;font-family:'Cairo';font-size:15px;font-weight:900;cursor:pointer;transition:.3s}
.adm{min-height:100vh}
.adm-nav{background:var(--s1);border-bottom:1px solid var(--bdr);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.adm-tabs{display:flex;gap:6px;flex-wrap:wrap}
.atab{background:transparent;border:1px solid var(--bdr);color:var(--mut);padding:7px 16px;border-radius:20px;font-family:'Cairo';font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.atab:hover{border-color:var(--bdr2);color:var(--g)}.atab.on{background:rgba(201,168,76,0.12);border-color:var(--g);color:var(--g);font-weight:800}
.atab-red{border-color:rgba(230,57,70,0.3)!important;color:var(--red)!important}
.adm-body{max-width:1300px;margin:0 auto;padding:28px 18px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:20px;text-align:center}
.stat-n{font-family:'Tajawal';font-size:30px;font-weight:900;color:var(--g)}.stat-l{color:var(--mut);font-size:12px;margin-top:4px}
.adm-pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.adm-pcard{background:var(--s1);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;transition:.3s}
.adm-pcard:hover{border-color:var(--bdr2)}
.adm-pimg{width:100%;height:170px;object-fit:cover;display:block;background:var(--s2)}
.adm-pbody{padding:16px}
.adm-pname{font-size:15px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-pcat{font-size:11px;color:var(--g);margin-bottom:4px;font-weight:700}
.adm-pprice{font-size:16px;font-weight:900;color:var(--g);margin-bottom:10px}
.sc-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sc-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.sc-btn:hover{border-color:var(--g);color:var(--g)}
.sc-val{font-size:16px;font-weight:900;color:var(--g);min-width:28px;text-align:center}
.sc-bar{flex:1;background:var(--s2);border-radius:4px;height:6px;overflow:hidden}
.sc-fill{height:100%;border-radius:4px;transition:width .4s}
.adm-acts{display:flex;gap:7px;flex-wrap:wrap}
.abtn{padding:6px 12px;border-radius:8px;border:none;font-family:'Cairo';font-size:12px;font-weight:700;cursor:pointer;transition:.2s;flex:1;min-width:60px;text-align:center}
.ab-edit{background:rgba(59,130,246,0.12);color:var(--blue)}.ab-edit:hover{background:rgba(59,130,246,0.24)}
.ab-tog-on{background:rgba(230,57,70,0.12);color:var(--red)}.ab-tog-on:hover{background:rgba(230,57,70,0.24)}
.ab-tog-off{background:rgba(34,197,94,0.12);color:var(--green)}.ab-tog-off:hover{background:rgba(34,197,94,0.24)}
.ab-del{background:rgba(230,57,70,0.08);color:var(--red)}.ab-del:hover{background:rgba(230,57,70,0.22)}
.adm-link-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.adm-link{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:5px 10px;font-size:10px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:rgba(201,168,76,0.1);border:1px solid var(--bdr2);color:var(--g);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Cairo'}
.apwrap{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;padding:28px 24px}
.apttl{font-family:'Tajawal';font-size:20px;font-weight:900;color:var(--g);margin-bottom:24px}
.ap2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.ap2col{grid-template-columns:1fr}}
.apfull{grid-column:1/-1}
.imgs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
@media(max-width:500px){.imgs-grid{grid-template-columns:repeat(2,1fr)}}
.img-slot{aspect-ratio:1;border-radius:12px;overflow:hidden;border:2px dashed var(--bdr);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.3s;position:relative}
.img-slot:hover{border-color:var(--g)}.img-slot img{width:100%;height:100%;object-fit:cover;display:block}
.img-slot-rm{position:absolute;top:5px;left:5px;background:rgba(230,57,70,0.85);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;z-index:2}
.img-slot-lbl{font-size:10px;color:var(--mut);margin-top:6px}.img-slot-n{font-size:20px;color:var(--mut);margin-bottom:4px}
.feat-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.feat-in{flex:1;margin-bottom:0!important}
.feat-rm{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);color:var(--red);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-feat-btn{width:100%;background:rgba(201,168,76,0.06);border:1px dashed rgba(201,168,76,0.22);color:var(--g);padding:8px;border-radius:9px;font-family:'Cairo';font-size:13px;cursor:pointer;margin-top:2px}
.fsel{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:11px;padding:13px 15px;color:var(--txt);font-family:'Cairo';font-size:14px;outline:none;margin-bottom:12px;appearance:none;cursor:pointer}
.sw-row{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--bdr);border-radius:11px;padding:12px 15px;margin-bottom:12px}
.sw-lbl{font-size:13px;font-weight:700}
.sw{position:relative;width:44px;height:24px}.sw input{opacity:0;width:0;height:0}
.sw-sl{position:absolute;inset:0;background:var(--s4);border-radius:24px;cursor:pointer;transition:.3s}
.sw-sl::before{content:'';position:absolute;width:18px;height:18px;right:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+.sw-sl{background:var(--g)}.sw input:checked+.sw-sl::before{transform:translateX(-20px)}
.ap-acts{display:flex;gap:12px;margin-top:24px;justify-content:flex-end;flex-wrap:wrap;align-items:center}

// ── JSONBin API ──
async function binGet(binId) {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: {'X-Master-Key': MASTER_KEY}
    });
    const d = await r.json();
    return d.record;
  } catch { return null; }
}

async function binSet(binId, data) {
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key': MASTER_KEY},
      body: JSON.stringify(data)
    });
  } catch {}
}

async function binCreate(name, data) {
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Master-Key': MASTER_KEY,'X-Bin-Name': name,'X-Bin-Private':'false'},
      body: JSON.stringify(data)
    });
    const d = await r.json();
    return d.metadata?.id || null;
  } catch { return null; }
}

async function initDB() {
  // Products bin
  if (!BIN_ID_P) {
    BIN_ID_P = await binCreate(BIN_NAME_P, {products: DEFAULT_PRODUCTS});
    if (BIN_ID_P) localStorage.setItem('bin_p', BIN_ID_P);
  }
  // Orders bin
  if (!BIN_ID_O) {
    BIN_ID_O = await binCreate(BIN_NAME_O, {orders: []});
    if (BIN_ID_O) localStorage.setItem('bin_o', BIN_ID_O);
  }

  // Load data
  if (BIN_ID_P) {
    const d = await binGet(BIN_ID_P);
    products = d?.products || DEFAULT_PRODUCTS;
  } else {
    products = JSON.parse(localStorage.getItem('products_bk') || 'null') || DEFAULT_PRODUCTS;
  }
  if (BIN_ID_O) {
    const d = await binGet(BIN_ID_O);
    orders = d?.orders || [];
  } else {
    orders = JSON.parse(localStorage.getItem('orders_bk') || '[]');
  }

  render();
}

async function saveProducts(p) {
  products = p;
  localStorage.setItem('products_bk', JSON.stringify(p));
  if (BIN_ID_P) await binSet(BIN_ID_P, {products: p});
  render();
}

async function saveOrders(o) {
  orders = o;
  localStorage.setItem('orders_bk', JSON.stringify(o));
  if (BIN_ID_O) await binSet(BIN_ID_O, {orders: o});
}

}

  document.getElementById('modal-inner').innerHTML=`<div class="mhd"><div class="mttl">أدخل بياناتك</div><button class="mclose" id="close-modal">✕</button></div><div class="mprod"><img class="mpi" src="${p.images[0]}" alt=""><div><div class="mpn">${escHtml(p.name)}</div><div class="mpp">${fPrice(p.price)}</div></div></div><label class="flbl">الاسم الكامل *</label><input class="fin" id="o-name" placeholder="أدخل اسمك الكامل"><div class="ferr hidden" id="e-name">الاسم مطلوب</div><label class="flbl">رقم الهاتف *</label><input class="fin" id="o-phone" type="tel" placeholder="مثال: 22212345678"><div class="ferr hidden" id="e-phone">رقم هاتف غير صحيح</div><label class="flbl">العنوان *</label><input class="fin" id="o-addr" placeholder="مثال: نواكشوط، تفرغ زينه"><div class="ferr hidden" id="e-addr">العنوان مطلوب</div><button class="fsub" id="submit-order">✅ تأكيد الطلب الآن</button><p style="text-align:center;color:var(--mut);font-size:11px;margin-top:10px">🔒 بياناتك محمية ومشفّرة</p>`;
  document.getElementById('order-modal').classList.remove('hidden');
  document.getElementById('close-modal').onclick=()=>document.getElementById('order-modal').classList.add('hidden');
  document.getElementById('submit-order').onclick=submitOrder;

async function submitOrder(){
  const name=document.getElementById('o-name').value.trim();
  const phone=document.getElementById('o-phone').value.trim();
  const addr=document.getElementById('o-addr').value.trim();
  let ok=true;
  if(!name){document.getElementById('e-name').classList.remove('hidden');ok=false;}else document.getElementById('e-name').classList.add('hidden');
  if(phone.replace(/\s/g,'').length<8){document.getElementById('e-phone').classList.remove('hidden');ok=false;}else document.getElementById('e-phone').classList.add('hidden');
  if(!addr){document.getElementById('e-addr').classList.remove('hidden');ok=false;}else document.getElementById('e-addr').classList.add('hidden');
  if(!ok) return;
  document.getElementById('submit-order').textContent='⏳ جاري الإرسال...';
  const p=selProduct;
  const newOrder={id:Date.now(),customer:name,phone,address:addr,product:p.name,productId:p.id,price:p.price,status:'pending',createdAt:new Date().toISOString()};
  const newOrders=[newOrder,...orders];
  await saveOrders(newOrders);
  document.getElementById('modal-inner').innerHTML=`<div class="succ"><div class="succ-ic">🎉</div><div class="succ-ttl">تم استلام طلبك!</div><p class="succ-msg">شكراً <strong style="color:var(--g)">${escHtml(name)}</strong>!<br>سيتواصل معك فريقنا على الرقم<br><strong style="color:var(--g)">${escHtml(phone)}</strong><br>خلال 24 ساعة 🚚</p><button class="succ-back" id="back-shop">🏪 العودة لمتابعة التسوق</button></div>`;
  document.getElementById('back-shop').onclick=goStore;
}

function startCountdown(){
  if(cdTimer) clearInterval(cdTimer);
  cdEnd=Date.now()+(selProduct.countdownHours||4)*3600000;
  cdTimer=setInterval(()=>{
    const d=Math.max(0,cdEnd-Date.now());
    const h=document.getElementById('cd-h'),m=document.getElementById('cd-m'),s=document.getElementById('cd-s');
    if(!h) return clearInterval(cdTimer);
    h.textContent=pad(Math.floor(d/3600000));
    m.textContent=pad(Math.floor((d%3600000)/60000));
    s.textContent=pad(Math.floor((d%60000)/1000));
  },1000);
}

function setGalImg(i){
  const imgs=selProduct.images||[];
  galIdx=(i+imgs.length)%imgs.length;
  const img=document.getElementById('gal-img');if(img)img.src=imgs[galIdx];
  document.querySelectorAll('.gal-dot').forEach((d,j)=>d.classList.toggle('on',j===galIdx));
  document.querySelectorAll('.gal-thumb').forEach((t,j)=>t.classList.toggle('on',j===galIdx));
}

async function saveForm(){
  const name=document.getElementById('f-name').value.trim();
  const price=document.getElementById('f-price').value;
  if(!name){const e=document.getElementById('save-err');e.textContent='⚠️ اسم المنتج مطلوب';e.classList.remove('hidden');return;}
  if(!price){const e=document.getElementById('save-err');e.textContent='⚠️ السعر مطلوب';e.classList.remove('hidden');return;}
  if(formImages.length===0){const e=document.getElementById('save-err');e.textContent='⚠️ أضف صورة واحدة على الأقل';e.classList.remove('hidden');return;}
  document.getElementById('save-form').textContent='⏳ جاري الحفظ...';
  const isEdit=editForm&&editForm!=='add';
  const product={id:isEdit?editForm.id:Date.now(),name,subtitle:document.getElementById('f-sub').value.trim(),price:Number(price),oldPrice:Number(document.getElementById('f-oprice').value)||Number(price),stock:Number(document.getElementById('f-stock').value)||0,badge:document.getElementById('f-badge').value.trim(),category:document.getElementById('f-cat').value,description:document.getElementById('f-desc').value.trim(),countdownHours:Number(document.getElementById('f-cd').value)||4,features:formFeatures.filter(x=>x.trim()),images:formImages,active:document.getElementById('f-active').checked,createdAt:isEdit?editForm.createdAt:new Date().toISOString()};
  const updated=isEdit?products.map(p=>p.id===editForm.id?product:p):[product,...products];
  editForm=null;
  await saveProducts(updated);
  showNotif(isEdit?'✅ تم حفظ التعديلات':'✅ تم نشر المنتج لجميع الزوار!');
}

let notifTimer=null;
function showNotif(msg){
  notifTimer&&clearTimeout(notifTimer);
  const b=document.getElementById('notif-box');
  if(!b)return;
  b.innerHTML=`<div class="notif">${msg}</div>`;
  notifTimer=setTimeout(()=>{if(b)b.innerHTML='';},3000);
}

function goStore(){view='store';selProduct=null;if(cdTimer)clearInterval(cdTimer);render();window.scrollTo(0,0);}
function goProduct(p){selProduct=p;view='product';galIdx=0;render();window.scrollTo(0,0);}

function handleLogoClick(){
  logoClicks++;clearTimeout(logoTimer);
  logoTimer=setTimeout(()=>logoClicks=0,3000);
  if(logoClicks>=5){logoClicks=0;view='login';render();}
}

function bindEvents(){
  document.querySelectorAll('#logo-click').forEach(el=>el.onclick=handleLogoClick);
  if(view==='store'){
    document.querySelectorAll('.cat-btn').forEach(b=>b.onclick=()=>{activeCat=b.dataset.cat;render();});
    document.querySelectorAll('.pcard,.pcard-btn').forEach(el=>el.onclick=(e)=>{e.stopPropagation();const pid=Number(el.dataset.pid||el.closest('[data-pid]')?.dataset.pid);const p=products.find(x=>x.id===pid);if(p)goProduct(p);});
  }
  if(view==='product'){
    document.getElementById('back-to-store')?.addEventListener('click',goStore);
    document.getElementById('back-to-store2')?.addEventListener('click',goStore);
    document.getElementById('order-btn')?.addEventListener('click',showOrderForm);
    document.getElementById('order-btn2')?.addEventListener('click',showOrderForm);
    document.getElementById('gal-prev')?.addEventListener('click',()=>setGalImg(galIdx-1));
    document.getElementById('gal-next')?.addEventListener('click',()=>setGalImg(galIdx+1));
    document.querySelectorAll('[data-gi]').forEach(el=>el.onclick=()=>setGalImg(Number(el.dataset.gi)));
    document.getElementById('order-modal')?.addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
  }
  if(view==='login'){
    const go=()=>{const p=document.getElementById('pass-input').value;if(p===ADMIN_PASS){adminAuth=true;view='admin';render();}else document.getElementById('login-err').classList.remove('hidden');};
    document.getElementById('login-btn')?.addEventListener('click',go);
    document.getElementById('pass-input')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  }
  if(view==='admin'){
    document.getElementById('tab-orders')?.addEventListener('click',()=>{adminTab='orders';render();});
    document.getElementById('tab-products')?.addEventListener('click',()=>{adminTab='products';editForm=null;render();});
    document.getElementById('logout-btn')?.addEventListener('click',()=>{adminAuth=false;view='store';render();});
    document.getElementById('show-ids-btn')?.addEventListener('click',()=>{
      const box=document.getElementById('ids-box');
      box.style.display=box.style.display==='none'?'block':'none';
      document.getElementById('show-pid').textContent=BIN_ID_P||'لم يُنشأ بعد';
      document.getElementById('show-oid').textContent=BIN_ID_O||'لم يُنشأ بعد';
    });
    if(adminTab==='orders'){
      document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{orderFilter=b.dataset.filter;confirmOId=null;render();});
      document.querySelectorAll('[data-mark]').forEach(b=>b.onclick=async()=>{const updated=orders.map(o=>o.id===Number(b.dataset.mark)?{...o,status:b.dataset.status}:o);await saveOrders(updated);showNotif('✅ تم التحديث');render();});
      document.querySelectorAll('[data-confirmorder]').forEach(b=>b.onclick=()=>{confirmOId=Number(b.dataset.confirmorder);render();});
      document.querySelectorAll('[data-cancelorder]').forEach(b=>b.onclick=()=>{confirmOId=null;render();});
      document.querySelectorAll('[data-delorder]').forEach(b=>b.onclick=async()=>{const updated=orders.filter(o=>o.id!==Number(b.dataset.delorder));await saveOrders(updated);confirmOId=null;showNotif('🗑️ تم الحذف');render();});
    }
    if(adminTab==='products'){
      document.getElementById('add-product-btn')?.addEventListener('click',()=>{editForm='add';formImages=[];formFeatures=[''];render();});
      document.getElementById('add-product-btn2')?.addEventListener('click',()=>{editForm='add';formImages=[];formFeatures=[''];render();});
      document.querySelectorAll('[data-stock]').forEach(b=>b.onclick=async()=>{const id=Number(b.dataset.stock),d=Number(b.dataset.d);const updated=products.map(p=>p.id===id?{...p,stock:Math.max(0,(p.stock||0)+d)}:p);await saveProducts(updated);});
      document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=async()=>{const id=Number(b.dataset.toggle);const updated=products.map(p=>p.id===id?{...p,active:!p.active}:p);await saveProducts(updated);showNotif('✅ تم التحديث');});
      document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{editForm=products.find(p=>p.id===Number(b.dataset.edit));render();});
      document.querySelectorAll('[data-confirmprod]').forEach(b=>b.onclick=()=>{confirmPId=Number(b.dataset.confirmprod);render();});
      document.querySelectorAll('[data-cancelprod]').forEach(b=>b.onclick=()=>{confirmPId=null;render();});
      document.querySelectorAll('[data-delprod]').forEach(b=>b.onclick=async()=>{const updated=products.filter(p=>p.id!==Number(b.dataset.delprod));await saveProducts(updated);confirmPId=null;showNotif('🗑️ تم حذف المنتج');});
      document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{const url=location.href.split('#')[0]+'#product-'+b.dataset.copy;navigator.clipboard?.writeText(url).then(()=>showNotif('📋 تم نسخ الرابط!')).catch(()=>showNotif('#product-'+b.dataset.copy));});
      if(editForm!==null){
        document.getElementById('cancel-form')?.addEventListener('click',()=>{editForm=null;render();});
        document.getElementById('save-form')?.addEventListener('click',saveForm);
        document.getElementById('add-feat')?.addEventListener('click',()=>{formFeatures.push('');document.getElementById('feats-wrap').innerHTML=renderFeats();bindFeatEvents();});
        bindFeatEvents();bindImgEvents();
      }
    }
  }
}

function bindFeatEvents(){
  document.querySelectorAll('[data-feat]').forEach(inp=>inp.oninput=()=>{formFeatures[Number(inp.dataset.feat)]=inp.value;});
  document.querySelectorAll('[data-rmfeat]').forEach(b=>b.onclick=()=>{formFeatures.splice(Number(b.dataset.rmfeat),1);if(!formFeatures.length)formFeatures=[''];document.getElementById('feats-wrap').innerHTML=renderFeats();bindFeatEvents();});
}

function bindImgEvents(){
  [0,1,2,3].forEach(i=>{
    const slot=document.getElementById('slot-'+i),fileIn=document.getElementById('file-'+i);
    if(!slot||!fileIn)return;
    slot.onclick=(e)=>{if(!e.target.dataset.rmimg&&!formImages[i])fileIn.click();};
    fileIn.onchange=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{formImages[i]=ev.target.result;document.getElementById('imgs-grid').innerHTML=renderImgSlots();bindImgEvents();};reader.readAsDataURL(file);};
  });
  document.querySelectorAll('[data-rmimg]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();formImages.splice(Number(b.dataset.rmimg),1);document.getElementById('imgs-grid').innerHTML=renderImgSlots();bindImgEvents();});
}

window.addEventListener('hashchange',()=>{
  const h=location.hash;
  if(h==='#admin'){view='login';render();}
  else if(h.startsWith('#product-')){const id=Number(h.replace('#product-',''));const p=products.find(x=>x.id===id);if(p)goProduct(p);}
});

if(location.hash==='#admin'){view='login';}
else if(location.hash.startsWith('#product-')){const id=Number(location.hash.replace('#product-',''));const p=products.find(x=>x.id===id);if(p){selProduct=p;view='product';}}

// Start
initDB();
</script>
