<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIM STORE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#c9a84c;--g2:#f0d060;--gd:#8a6f20;
  --red:#e63946;--green:#22c55e;--warn:#f59e0b;--blue:#3b82f6;
  --bg:#07070e;--s1:#0f0f18;--s2:#171724;--s3:#1e1e2e;--s4:#252538;
  --txt:#ede8d8;--mut:#6b6457;--bdr:rgba(201,168,76,0.13);
  --bdr2:rgba(201,168,76,0.25);
}
body{background:var(--bg);color:var(--txt);font-family:'Cairo',sans-serif;direction:rtl;min-height:100vh}

/* ── NAV ── */
.nav{background:rgba(7,7,14,0.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr);padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;height:62px;
  position:sticky;top:0;z-index:400}
.logo{font-family:'Tajawal';font-size:24px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--g),var(--g2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:default;user-select:none}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-pill{background:var(--red);color:#fff;padding:4px 13px;
  border-radius:20px;font-size:11px;font-weight:800;animation:pulse 1.8s infinite}
.nav-cat-pill{background:rgba(201,168,76,0.1);border:1px solid var(--bdr2);
  color:var(--g);padding:4px 13px;border-radius:20px;font-size:11px;font-weight:700}

/* ── HERO BANNER ── */
.hero-banner{
  background:linear-gradient(135deg,#07070e 0%,#0f0f1e 50%,#07070e 100%);
  padding:60px 24px 50px;text-align:center;position:relative;overflow:hidden}
.hero-banner::before{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);
  width:700px;height:400px;
  background:radial-gradient(ellipse,rgba(201,168,76,0.08) 0%,transparent 70%);
  pointer-events:none}
.hero-banner::after{content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(201,168,76,0.04) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none}
.hb-tag{display:inline-block;background:rgba(201,168,76,0.08);
  border:1px solid var(--bdr2);color:var(--g);
  padding:5px 18px;border-radius:30px;font-size:12px;font-weight:700;
  margin-bottom:18px;letter-spacing:2px;position:relative;z-index:1}
.hb-title{font-family:'Tajawal';font-size:clamp(32px,6vw,60px);font-weight:900;
  line-height:1.15;margin-bottom:12px;position:relative;z-index:1;
  background:linear-gradient(135deg,#fff 30%,var(--g));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hb-sub{color:var(--mut);font-size:15px;max-width:480px;margin:0 auto 30px;
  line-height:1.7;position:relative;z-index:1}
.hb-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;position:relative;z-index:1}
.hbs{text-align:center}
.hbs-n{font-family:'Tajawal';font-size:28px;font-weight:900;color:var(--g)}
.hbs-l{font-size:11px;color:var(--mut);margin-top:2px}

/* ── CATEGORY FILTER ── */
.cat-bar{padding:24px 24px 0;max-width:1300px;margin:0 auto}
.cat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--mut);
  padding:8px 18px;border-radius:30px;font-family:'Cairo';font-size:13px;font-weight:600;
  cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px}
.cat-btn:hover{border-color:var(--bdr2);color:var(--g)}
.cat-btn.on{background:rgba(201,168,76,0.12);border-color:var(--g);color:var(--g);font-weight:800}

/* ── PRODUCTS GRID ── */
.store-section{max-width:1300px;margin:0 auto;padding:28px 24px 60px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.sec-ttl{font-family:'Tajawal';font-size:20px;font-weight:900;
  display:flex;align-items:center;gap:8px}
.sec-count{color:var(--mut);font-size:13px;font-weight:400}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}

/* ── PRODUCT CARD ── */
.pcard{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;
  overflow:hidden;transition:all .35s;cursor:pointer;position:relative}
.pcard:hover{border-color:var(--bdr2);transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 0 1px rgba(201,168,76,0.15)}
.pcard-imgs{position:relative;height:220px;overflow:hidden;background:var(--s2)}
.pcard-img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.pcard:hover .pcard-img{transform:scale(1.06)}
.pcard-badge{position:absolute;top:10px;right:10px;
  background:var(--red);color:#fff;padding:4px 11px;
  border-radius:16px;font-size:11px;font-weight:800;z-index:2}
.pcard-cat{position:absolute;top:10px;left:10px;
  background:rgba(7,7,14,0.75);backdrop-filter:blur(8px);
  padding:4px 10px;border-radius:14px;font-size:11px;color:var(--g);font-weight:700;z-index:2}
.pcard-stock-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--s3)}
.pcard-stock-fill{height:100%;background:linear-gradient(to left,var(--red),#ff7070);transition:width .5s}
.pcard-body{padding:18px}
.pcard-name{font-size:16px;font-weight:800;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:12px;color:var(--mut);margin-bottom:10px}
.pcard-pricing{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pcard-price{font-family:'Tajawal';font-size:22px;font-weight:900;color:var(--g)}
.pcard-old{font-size:14px;color:var(--mut);text-decoration:line-through}
.pcard-disc{background:rgba(230,57,70,0.14);border:1px solid rgba(230,57,70,0.28);
  color:var(--red);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:800}
.pcard-stock-lbl{font-size:11px;color:var(--mut);margin-bottom:10px}
.pcard-stock-lbl span{color:var(--warn);font-weight:700}
.pcard-btn{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));
  color:#07070e;border:none;padding:11px;border-radius:11px;
  font-family:'Cairo';font-size:14px;font-weight:900;cursor:pointer;transition:.3s}
.pcard-btn:hover{opacity:.88;transform:scale(1.02)}

/* ── PRODUCT DETAIL PAGE ── */
.detail-page{max-width:1100px;margin:0 auto;padding:36px 20px 60px}
.back-btn{display:inline-flex;align-items:center;gap:7px;
  background:var(--s2);border:1px solid var(--bdr);color:var(--mut);
  padding:8px 16px;border-radius:30px;font-size:13px;cursor:pointer;
  transition:.2s;margin-bottom:28px;font-family:'Cairo'}
.back-btn:hover{border-color:var(--bdr2);color:var(--g)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:start}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr;gap:22px}}

/* gallery */
.gal-main{border-radius:18px;overflow:hidden;background:var(--s2);
  border:1px solid var(--bdr);aspect-ratio:1;position:relative}
.gal-main img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
.gal-arrow{position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(7,7,14,0.65);backdrop-filter:blur(8px);
  border:1px solid var(--bdr2);color:var(--g);width:36px;height:36px;
  border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:.2s;z-index:5}
.gal-arrow:hover{background:rgba(201,168,76,0.2)}
.gal-arrow.prev{right:10px}
.gal-arrow.next{left:10px}
.gal-dots{display:flex;justify-content:center;gap:7px;margin-top:12px}
.gal-dot{width:8px;height:8px;border-radius:50%;
  background:var(--s4);cursor:pointer;transition:.2s;border:1px solid var(--bdr)}
.gal-dot.on{background:var(--g);border-color:var(--g);transform:scale(1.2)}
.gal-thumbs{display:flex;gap:9px;margin-top:10px}
.gal-thumb{width:68px;height:68px;border-radius:10px;object-fit:cover;
  border:2px solid transparent;cursor:pointer;transition:.2s;opacity:.5;flex-shrink:0}
.gal-thumb.on{border-color:var(--g);opacity:1}

/* detail info */
.d-badge{display:inline-flex;align-items:center;gap:6px;
  background:rgba(201,168,76,0.08);border:1px solid var(--bdr2);color:var(--g);
  padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:14px}
.d-name{font-family:'Tajawal';font-size:clamp(22px,4vw,36px);font-weight:900;line-height:1.2;margin-bottom:6px}
.d-sub{color:var(--mut);font-size:14px;margin-bottom:18px}
.d-pricing{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.d-price{font-family:'Tajawal';font-size:42px;font-weight:900;color:var(--g)}
.d-old{font-size:20px;color:var(--mut);text-decoration:line-through}
.d-save{background:rgba(230,57,70,0.14);border:1px solid rgba(230,57,70,0.28);
  color:var(--red);padding:3px 10px;border-radius:8px;font-size:13px;font-weight:800}

/* countdown */
.cbar{background:linear-gradient(135deg,#140808,#1e0d0d);
  border:1px solid rgba(230,57,70,0.22);border-radius:12px;
  padding:12px 16px;margin:14px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.cbar-lbl{color:#fca5a5;font-size:12px;font-weight:700;white-space:nowrap}
.ctimer{display:flex;align-items:center;gap:5px}
.cunit{background:rgba(230,57,70,0.18);border:1px solid rgba(230,57,70,0.32);
  border-radius:7px;padding:3px 8px;min-width:40px;text-align:center}
.cnum{font-size:18px;font-weight:900;color:var(--red);font-family:'Tajawal';line-height:1.1}
.clbl{font-size:9px;color:#fca5a5}
.csep{color:var(--red);font-size:16px;font-weight:900}

/* stock bar */
.sbar{background:var(--s2);border:1px solid rgba(230,57,70,0.18);
  border-radius:10px;padding:10px 14px;margin:12px 0}
.sbar-lbl{font-size:12px;color:#fca5a5;margin-bottom:6px;font-weight:700}
.strack{background:var(--s3);border-radius:4px;height:7px;overflow:hidden}
.sfill{background:linear-gradient(to left,var(--red),#ff7070);height:100%;border-radius:4px;transition:width .6s}

/* description */
.d-desc-box{background:var(--s2);border:1px solid var(--bdr);
  border-right:3px solid var(--g);border-radius:12px;
  padding:14px 16px;margin:14px 0;font-size:14px;color:#9994a8;line-height:1.8}

/* features */
.d-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.d-feat{background:var(--s2);border:1px solid var(--bdr);
  border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:13px}
.d-feat-ic{color:var(--g);font-weight:900;flex-shrink:0}

/* CTA */
.d-cta{width:100%;background:linear-gradient(135deg,var(--red),#c1121f);
  color:#fff;border:none;padding:17px;border-radius:13px;
  font-family:'Cairo';font-size:18px;font-weight:900;cursor:pointer;
  transition:all .3s;box-shadow:0 8px 28px rgba(230,57,70,0.38);margin-top:4px}
.d-cta:hover{transform:translateY(-3px);box-shadow:0 14px 38px rgba(230,57,70,0.52)}
.d-trust{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.d-trust-i{font-size:12px;color:var(--mut)}

/* reviews */
.reviews-section{max-width:960px;margin:0 auto;padding:0 20px 60px}
.rvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.rvc{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:18px}
.rvh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rva{font-size:30px}
.rvn{font-weight:700;font-size:13px}
.rv-stars{color:#f59e0b;font-size:13px}
.rvt{color:var(--mut);font-size:12px;line-height:1.7}

/* ── MODAL ── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);
  z-index:600;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease}
@media(min-width:600px){.mov{align-items:center;padding:20px}}
.modal{background:var(--s1);border:1px solid var(--bdr);
  border-radius:22px 22px 0 0;padding:28px 22px 36px;
  width:100%;max-width:460px;animation:slideUp .3s ease;
  max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:22px}}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mttl{font-family:'Tajawal';font-size:19px;font-weight:900;color:var(--g)}
.mclose{background:rgba(255,255,255,0.06);border:none;color:var(--mut);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:.2s}
.mclose:hover{background:rgba(255,255,255,0.12);color:var(--txt)}
.mprod{display:flex;align-items:center;gap:12px;background:var(--s2);
  border-radius:12px;padding:12px;margin-bottom:18px}
.mpi{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.mpn{font-weight:800;font-size:14px}
.mpp{color:var(--g);font-weight:900;font-size:17px;margin-top:3px}

/* form */
.flbl{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:7px;display:block}
.fin{width:100%;background:var(--s2);border:1px solid var(--bdr);
  border-radius:11px;padding:13px 15px;color:var(--txt);
  font-family:'Cairo';font-size:14px;outline:none;transition:.2s;margin-bottom:12px}
.fin:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,0.08)}
.fin::placeholder{color:#333345}
.ferr{color:var(--red);font-size:11px;margin:-8px 0 10px}
.fsub{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));
  color:#07070e;border:none;padding:15px;border-radius:12px;
  font-family:'Cairo';font-size:16px;font-weight:900;cursor:pointer;
  transition:all .3s;margin-top:4px}
.fsub:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,168,76,0.3)}
.fsub:disabled{opacity:.65;cursor:not-allowed}
.succ{text-align:center;padding:16px}
.succ-ic{font-size:70px;animation:bounceIn .5s ease;margin-bottom:14px}
.succ-ttl{font-family:'Tajawal';font-size:22px;font-weight:900;color:var(--green);margin-bottom:8px}
.succ-msg{color:var(--mut);font-size:13px;line-height:1.85;margin-bottom:22px}
.succ-back{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));
  color:#07070e;border:none;padding:14px;border-radius:12px;
  font-family:'Cairo';font-size:15px;font-weight:900;cursor:pointer;transition:.3s}
.succ-back:hover{opacity:.88}

/* ── ADMIN ── */
.adm{min-height:100vh}
.adm-nav{background:var(--s1);border-bottom:1px solid var(--bdr);
  padding:13px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.adm-tabs{display:flex;gap:6px;flex-wrap:wrap}
.atab{background:transparent;border:1px solid var(--bdr);color:var(--mut);
  padding:7px 16px;border-radius:20px;font-family:'Cairo';font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.atab:hover{border-color:var(--bdr2);color:var(--g)}
.atab.on{background:rgba(201,168,76,0.12);border-color:var(--g);color:var(--g);font-weight:800}
.atab-red{border-color:rgba(230,57,70,0.3)!important;color:var(--red)!important}
.atab-red:hover{background:rgba(230,57,70,0.08)!important}
.adm-body{max-width:1300px;margin:0 auto;padding:28px 18px}

/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:20px;text-align:center}
.stat-n{font-family:'Tajawal';font-size:30px;font-weight:900;color:var(--g)}
.stat-l{color:var(--mut);font-size:12px;margin-top:4px}

/* products admin grid */
.adm-pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.adm-pcard{background:var(--s1);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;transition:.3s}
.adm-pcard:hover{border-color:var(--bdr2)}
.adm-pimg{width:100%;height:170px;object-fit:cover;display:block;background:var(--s2)}
.adm-pbody{padding:16px}
.adm-pname{font-size:15px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-pcat{font-size:11px;color:var(--g);margin-bottom:4px;font-weight:700}
.adm-pprice{font-size:16px;font-weight:900;color:var(--g);margin-bottom:10px}
.sc-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sc-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.sc-btn:hover{border-color:var(--g);color:var(--g)}
.sc-val{font-size:16px;font-weight:900;color:var(--g);min-width:28px;text-align:center}
.sc-bar{flex:1;background:var(--s2);border-radius:4px;height:6px;overflow:hidden}
.sc-fill{height:100%;border-radius:4px;transition:width .4s}
.adm-acts{display:flex;gap:7px;flex-wrap:wrap}
.abtn{padding:6px 12px;border-radius:8px;border:none;font-family:'Cairo';
  font-size:12px;font-weight:700;cursor:pointer;transition:.2s;flex:1;min-width:60px;text-align:center}
.ab-edit{background:rgba(59,130,246,0.12);color:var(--blue)}
.ab-edit:hover{background:rgba(59,130,246,0.24)}
.ab-toggle-on{background:rgba(230,57,70,0.12);color:var(--red)}
.ab-toggle-on:hover{background:rgba(230,57,70,0.24)}
.ab-toggle-off{background:rgba(34,197,94,0.12);color:var(--green)}
.ab-toggle-off:hover{background:rgba(34,197,94,0.24)}
.ab-del{background:rgba(230,57,70,0.08);color:var(--red)}
.ab-del:hover{background:rgba(230,57,70,0.22)}
.adm-link-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.adm-link{flex:1;background:var(--s2);border:1px solid var(--bdr);
  border-radius:8px;padding:5px 10px;font-size:10px;color:var(--mut);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:rgba(201,168,76,0.1);border:1px solid var(--bdr2);
  color:var(--g);padding:5px 10px;border-radius:8px;font-size:11px;
  font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;font-family:'Cairo'}
.copy-btn:hover{background:rgba(201,168,76,0.2)}

/* ADD PRODUCT FORM */
.apwrap{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;padding:28px 24px}
.apttl{font-family:'Tajawal';font-size:20px;font-weight:900;color:var(--g);margin-bottom:24px;
  display:flex;align-items:center;gap:10px}
.ap2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.ap2col{grid-template-columns:1fr}}
.apfull{grid-column:1/-1}

/* image upload */
.imgs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
@media(max-width:500px){.imgs-grid{grid-template-columns:repeat(2,1fr)}}
.img-slot{aspect-ratio:1;border-radius:12px;overflow:hidden;
  border:2px dashed var(--bdr);background:var(--s2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:.3s;position:relative}

// localStorage
function lsGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// Utils
const fPrice = (n) => Number(n).toLocaleString("fr-FR") + " MRU";
const pad = (n) => String(n).padStart(2, "0");
const catInfo = (id) => CATEGORIES.find(c => c.id === id) || CATEGORIES[7];

function useCountdown(hours) {
  const end = React.useRef(Date.now() + (hours || 4) * 3600000);
  const [t, setT] = React.useState({ h: hours || 4, m: 0, s: 0 });
  React.useEffect(() => {
    const tick = () => {
      const d = Math.max(0, end.current - Date.now());
      setT({ h: Math.floor(d / 3600000), m: Math.floor((d % 3600000) / 60000), s: Math.floor((d % 60000) / 1000) });
    };
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, []);
  return t;
}

// ORDER MODAL
// ══════════════════════════════════════════════════════════════
function OrderModal({ product, onClose, onSuccess, onOrderPlaced }) {
  const [form, setForm] = React.useState({ name: "", phone: "", address: "" });
  const [err, setErr] = React.useState({});
  const [loading, setLoading] = React.useState(false);
  const [done, setDone] = React.useState(false);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "الاسم مطلوب";
    if (form.phone.replace(/\s/g, "").length < 8) e.phone = "رقم هاتف غير صحيح";
    if (!form.address.trim()) e.address = "العنوان مطلوب";
    return e;
  };

  const submit = async () => {
    const e = validate();
    if (Object.keys(e).length) { setErr(e); return; }
    setLoading(true);
    // if (window.fbq) { fbq('track','Lead'); fbq('track','Purchase',{value:product.price,currency:'MRO'}); }
    const newOrder = {
      id: Date.now(), customer: form.name.trim(), phone: form.phone.trim(),
      address: form.address.trim(), product: product.name, productId: product.id,
      price: product.price, status: "pending", createdAt: new Date().toISOString(),
    };
    if (onOrderPlaced) onOrderPlaced(newOrder); // يحدّث الـ state الجذري فوراً
    setLoading(false);
    setDone(true);
  };

  return (
    <div className="mov" onClick={() => !done && onClose()}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        {done ? (
          <div className="succ">
            <div className="succ-ic">🎉</div>
            <div className="succ-ttl">تم استلام طلبك!</div>
            <p className="succ-msg">
              شكراً <strong style={{ color: "var(--g)" }}>{form.name}</strong>!<br />
              سيتواصل معك فريقنا على الرقم<br />
              <strong style={{ color: "var(--g)" }}>{form.phone}</strong><br />
              خلال 24 ساعة لتأكيد الطلب وترتيب التوصيل 🚚
            </p>
            <button className="succ-back" onClick={() => { onSuccess(); onClose(); }}>
              🏪 العودة لمتابعة التسوق
            </button>
          </div>
        ) : (
          <>
            <div className="mhd">
              <div className="mttl">أدخل بياناتك</div>
              <button className="mclose" onClick={onClose}>✕</button>
            </div>
            <div className="mprod">
              <img src={product.images?.[0]} alt="" className="mpi" />
              <div>
                <div className="mpn">{product.name}</div>
                <div className="mpp">{fPrice(product.price)}</div>
              </div>
            </div>
            <label className="flbl">الاسم الكامل *</label>
            <input className="fin" placeholder="أدخل اسمك الكامل" value={form.name}
              onChange={e => { setForm({ ...form, name: e.target.value }); setErr({ ...err, name: "" }); }} />
            {err.name && <div className="ferr">{err.name}</div>}
            <label className="flbl">رقم الهاتف *</label>
            <input className="fin" type="tel" placeholder="مثال: 22212345678" value={form.phone}
              onChange={e => { setForm({ ...form, phone: e.target.value }); setErr({ ...err, phone: "" }); }} />
            {err.phone && <div className="ferr">{err.phone}</div>}
            <label className="flbl">العنوان (المدينة / الحي) *</label>
            <input className="fin" placeholder="مثال: نواكشوط، تفرغ زينه" value={form.address}
              onChange={e => { setForm({ ...form, address: e.target.value }); setErr({ ...err, address: "" }); }} />
            {err.address && <div className="ferr">{err.address}</div>}
            <button className="fsub" onClick={submit} disabled={loading}>

          {/* INFO */}
          <div>
            <div className="d-badge">
              <span>{cat.icon}</span>

              {product.badge && <span style={{ marginRight: 6, color: "var(--red)", borderRight: "1px solid rgba(201,168,76,0.3)", paddingRight: 8 }}>🔥 {product.badge}</span>}

            <h1 className="d-name">{product.name}</h1>
            <p className="d-sub">{product.subtitle}</p>

            <div className="d-pricing">
              <span className="d-price">{fPrice(product.price)}</span>
              {disc > 0 && (
                <>

                <div className="cunit"><div className="cnum">{pad(cd.s)}</div><div className="clbl">ثانية</div></div>
              </div>
            </div>

            {/* Stock */}
            {product.stock <= 15 && (
              <div className="sbar">

// STORE HOME
// ══════════════════════════════════════════════════════════════
function StoreHome({ products, onViewProduct, onLogoClick }) {
  const [activeCat, setActiveCat] = React.useState("all");

  const visible = products.filter(p => p.active !== false);
  const filtered = activeCat === "all" ? visible : visible.filter(p => p.category === activeCat);
  const usedCats = ["all", ...new Set(visible.map(p => p.category).filter(Boolean))];

  return (
    <div>
      <nav className="nav">
        <div className="logo" onClick={onLogoClick}>{STORE_NAME}</div>
        <div className="nav-right">
          <span className="nav-cat-pill">🛍️ {visible.length} منتج</span>
          <span className="nav-pill">⚡ عروض حصرية</span>
        </div>
      </nav>

      {/* Hero */}
      <div className="hero-banner">
        <div className="hb-tag">✨ متجرك الأول في موريتانيا</div>
        <h1 className="hb-title">تسوّق الأفضل<br />بأسعار لا تُنافس</h1>
        <p className="hb-sub">منتجات مختارة بعناية فائقة مع توصيل سريع لجميع المناطق</p>
        <div className="hb-stats">
          <div className="hbs"><div className="hbs-n">+2000</div><div className="hbs-l">عميل راضٍ</div></div>
          <div className="hbs"><div className="hbs-n">48h</div><div className="hbs-l">توصيل سريع</div></div>
          <div className="hbs"><div className="hbs-n">100%</div><div className="hbs-l">منتجات أصلية</div></div>
          <div className="hbs"><div className="hbs-n">24/7</div><div className="hbs-l">دعم العملاء</div></div>
        </div>
      </div>

      {/* Category filter */}
      <div className="cat-bar">
        <div className="cat-scroll">
          {usedCats.map(cid => {
            const info = cid === "all" ? { icon: "🏪", label: "الكل" } : catInfo(cid);
            return (
              <button key={cid} className={`cat-btn ${activeCat === cid ? "on" : ""}`}
                onClick={() => setActiveCat(cid)}>
                {info.icon} {info.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* Products */}
      <div className="store-section">
        <div className="sec-hd">
          <div className="sec-ttl">
            🛍️ منتجاتنا
            <span className="sec-count">({filtered.length} منتج)</span>
          </div>
        </div>

        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📦</div>
            <div>لا توجد منتجات في هذا الصنف</div>
          </div>
        ) : (
          <div className="pgrid">
            {filtered.map(p => {
              const disc = p.oldPrice > p.price
                ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
              const stockPct = Math.min(100, Math.round((p.stock / 20) * 100));
              const cat = catInfo(p.category);
              return (
                <div className="pcard" key={p.id} onClick={() => onViewProduct(p)}>
                  <div className="pcard-imgs">
                    <img src={p.images?.[0]} alt={p.name} className="pcard-img" />
                    {p.badge && <div className="pcard-badge">{p.badge}</div>}
                    <div className="pcard-cat">{cat.icon} {cat.label}</div>
                    <div className="pcard-stock-bar">
                      <div className="pcard-stock-fill" style={{ width: `${stockPct}%` }} />
                    </div>
                  </div>
                  <div className="pcard-body">
                    <div className="pcard-name">{p.name}</div>
                    <div className="pcard-sub">{p.subtitle}</div>
                    <div className="pcard-pricing">
                      <span className="pcard-price">{fPrice(p.price)}</span>
                      {disc > 0 && (
                        <>
                          <span className="pcard-old">{fPrice(p.oldPrice)}</span>
                          <span className="pcard-disc">-{disc}%</span>
                        </>
                      )}
                    </div>
                    {p.stock <= 10 && (
                      <div className="pcard-stock-lbl">⚠️ متبقي <span>{p.stock} قطع</span> فقط</div>
                    )}
                    <button className="pcard-btn" onClick={e => { e.stopPropagation(); onViewProduct(p); }}>
                      🛒 اشتري الآن
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="ftr">© 2024 <strong>{STORE_NAME}</strong> — جميع الحقوق محفوظة | موريتانيا 🇲🇷</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ADD / EDIT PRODUCT FORM
// ══════════════════════════════════════════════════════════════
function ProductForm({ initial, currentProducts, onSave, onCancel }) {
  const isEdit = !!initial;
  const [f, setF] = React.useState(initial ? { ...initial } : {
    name: "", subtitle: "", price: "", oldPrice: "",
    stock: 10, badge: "", category: "electronics",
    description: "", features: [""], countdownHours: 5, active: true,
  });
  const [images, setImages] = React.useState(initial?.images || []);
  const [saving, setSaving] = React.useState(false);
  const fileRefs = [React.useRef(), React.useRef(), React.useRef(), React.useRef()];

  const handleImgFile = (idx, e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const newImgs = [...images];
      newImgs[idx] = ev.target.result;
      setImages(newImgs);
    };
    reader.readAsDataURL(file);
  };

  const removeImg = (idx) => {
    const newImgs = [...images];
    newImgs.splice(idx, 1);
    setImages(newImgs);
  };

  const setFeat = (i, v) => { const a = [...f.features]; a[i] = v; setF({ ...f, features: a }); };
  const addFeat = () => setF({ ...f, features: [...f.features, ""] });
  const rmFeat = (i) => setF({ ...f, features: f.features.filter((_, j) => j !== i) });
  const [saveErr, setSaveErr] = React.useState("");

  const save = () => {
    if (!f.name.trim()) { setSaveErr("⚠️ اسم المنتج مطلوب"); return; }
    if (!f.price)       { setSaveErr("⚠️ السعر مطلوب"); return; }
    if (images.length === 0) { setSaveErr("⚠️ أضف صورة واحدة على الأقل"); return; }
    setSaveErr("");
    const product = {
      ...f,
      id: isEdit ? initial.id : Date.now(),
      price: Number(f.price),
      oldPrice: Number(f.oldPrice) || Number(f.price),
      stock: Number(f.stock) || 0,
      countdownHours: Number(f.countdownHours) || 4,
      images,
      features: f.features.filter(x => x.trim()),
      createdAt: isEdit ? initial.createdAt : new Date().toISOString(),
      active: f.active !== false,
    };
    const updated = isEdit
      ? currentProducts.map(p => p.id === initial.id ? product : p)
      : [product, ...currentProducts];
    onSave(updated);
    lsSet(PRODUCTS_KEY, updated);
  };

  return (
    <div className="apwrap">
      <div className="apttl">
        {isEdit ? "✏️ تعديل المنتج" : "➕ إضافة منتج جديد"}
      </div>

      {/* 4 image slots */}
      <div style={{ marginBottom: 6 }}>
        <label className="flbl">صور المنتج (حتى 4 صور) *</label>
        <div className="imgs-grid">
          {[0, 1, 2, 3].map(idx => (
            <div key={idx} className="img-slot"
              onClick={() => !images[idx] && fileRefs[idx].current?.click()}>
              <input ref={fileRefs[idx]} type="file" accept="image/*"
                onChange={e => handleImgFile(idx, e)} />
              {images[idx] ? (
                <>
                  <img src={images[idx]} alt="" />
                  <button className="img-slot-rm"
                    onClick={e => { e.stopPropagation(); removeImg(idx); }}>✕</button>
                </>
              ) : (
                <>
                  <div className="img-slot-n">📷</div>
                  <div className="img-slot-lbl">صورة {idx + 1}</div>
                  <div style={{ fontSize: 10, color: "var(--mut)", marginTop: 4, textAlign: "center" }}>
                    {idx === 0 ? "(رئيسية)" : "(اختياري)"}
                  </div>
                </>
              )}
            </div>
          ))}
        </div>
        {images.length > 0 && (
          <p style={{ fontSize: 11, color: "var(--mut)", marginBottom: 16 }}>
            ✅ {images.length} صورة — اضغط ✕ لحذف أي صورة
          </p>
        )}
      </div>

      <div className="ap2col">
        <div>
          <label className="flbl">اسم المنتج *</label>
          <input className="fin" placeholder="مثال: ساعة ذكية Pro X" value={f.name}
            onChange={e => setF({ ...f, name: e.target.value })} />
        </div>
        <div>
          <label className="flbl">العنوان الفرعي</label>
          <input className="fin" placeholder="مثال: التكنولوجيا على معصمك" value={f.subtitle}
            onChange={e => setF({ ...f, subtitle: e.target.value })} />
        </div>

        <div>
          <label className="flbl">صنف المنتج *</label>
          <select className="fsel" value={f.category}
            onChange={e => setF({ ...f, category: e.target.value })}>
            {CATEGORIES.map(c => (
              <option key={c.id} value={c.id}>{c.icon} {c.label}</option>
            ))}
          </select>
        </div>
        <div>
          <label className="flbl">البادج (علامة العرض)</label>
          <input className="fin" placeholder="مثال: الأكثر مبيعاً" value={f.badge}
            onChange={e => setF({ ...f, badge: e.target.value })} />
        </div>

        <div>
          <label className="flbl">السعر الحالي (MRU) *</label>
          <input className="fin" type="number" placeholder="4 500" value={f.price}
            onChange={e => setF({ ...f, price: e.target.value })} />
        </div>
        <div>
          <label className="flbl">السعر قبل الخصم (MRU)</label>
          <input className="fin" type="number" placeholder="6 500" value={f.oldPrice}
            onChange={e => setF({ ...f, oldPrice: e.target.value })} />
        </div>

        <div>
          <label className="flbl">الكمية المتاحة</label>
          <input className="fin" type="number" placeholder="10" value={f.stock}
            onChange={e => setF({ ...f, stock: e.target.value })} />
        </div>
        <div>
          <label className="flbl">مدة العد التنازلي (ساعات)</label>
          <input className="fin" type="number" placeholder="5" value={f.countdownHours}
            onChange={e => setF({ ...f, countdownHours: e.target.value })} />
        </div>

        <div className="apfull">
          <label className="flbl">وصف المنتج</label>
          <textarea className="fin" rows={3} placeholder="اكتب وصفاً مفصلاً للمنتج..."
            value={f.description} onChange={e => setF({ ...f, description: e.target.value })}
            style={{ resize: "vertical" }} />
        </div>

        <div className="apfull">
          <label className="flbl">مميزات المنتج</label>
          {f.features.map((feat, i) => (
            <div className="feat-row" key={i}>
              <input className="fin feat-in" placeholder={`ميزة ${i + 1}`}
                value={feat} onChange={e => setFeat(i, e.target.value)} />
              {f.features.length > 1 &&
                <button className="feat-rm" onClick={() => rmFeat(i)}>✕</button>}
            </div>
          ))}
          <button className="add-feat-btn" onClick={addFeat}>+ إضافة ميزة</button>
        </div>

        <div className="apfull">
          <div className="sw-row">
            <span className="sw-lbl">نشر المنتج في المتجر</span>
            <label className="sw">
              <input type="checkbox" checked={f.active !== false}
                onChange={e => setF({ ...f, active: e.target.checked })} />
              <span className="sw-sl" />
            </label>
          </div>
        </div>
      </div>

      <div className="ap-acts">
        {saveErr && (
          <div style={{ color: "var(--red)", fontSize: 13, background: "rgba(230,57,70,0.1)", border: "1px solid rgba(230,57,70,0.25)", borderRadius: 9, padding: "8px 14px", marginLeft: "auto", marginRight: 0 }}>
            {saveErr}
          </div>
        )}
        <button className="btn-cancel2" onClick={onCancel}>إلغاء</button>
        <button className="btn-save" onClick={save}>
          {isEdit ? "💾 حفظ التعديلات" : "✅ نشر المنتج الآن"}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ADMIN DASHBOARD — يستقبل البيانات من الـ App الجذري
// ══════════════════════════════════════════════════════════════
function AdminDashboard({ products, orders, onProductsChange, onOrdersChange, onLogout }) {
  const [tab, setTab] = React.useState("orders");
  const [filter, setFilter] = React.useState("all");
  const [notif, setNotif] = React.useState(null);
  const [form, setForm] = React.useState(null);
  const [confirmId, setConfirmId] = React.useState(null);
  const [confirmPid, setConfirmPid] = React.useState(null);

  const showN = (msg) => { setNotif(msg); setTimeout(() => setNotif(null), 3000); };
  const fp2 = n => Number(n).toLocaleString("fr-FR");

  // orders — يحدّث الـ state الجذري مباشرة
  const updateStatus = (id, status) => {
    const u = orders.map(o => o.id === id ? { ...o, status } : o);
    onOrdersChange(u);
    showN(status === "delivered" ? "✅ تم التحديث" : "⏳ تم الإرجاع");
  };
  const delOrder = (id) => {
    const u = orders.filter(o => o.id !== id);
    onOrdersChange(u);
    setConfirmId(null); showN("🗑️ تم حذف الطلب");
  };

  // products — يحدّث الـ state الجذري مباشرة → يظهر في المتجر فوراً
  const updateStock = (id, d) => {
    const u = products.map(p => p.id === id ? { ...p, stock: Math.max(0, (p.stock || 0) + d) } : p);
    onProductsChange(u);
  };
  const toggleActive = (id) => {
    const u = products.map(p => p.id === id ? { ...p, active: !p.active } : p);
    onProductsChange(u); showN("✅ تم التحديث");
  };
  const delProduct = (id) => {
    const u = products.filter(p => p.id !== id);
    onProductsChange(u);
    setConfirmPid(null); showN("🗑️ تم حذف المنتج");
  };

  const filtered = filter === "all" ? orders : orders.filter(o => o.status === filter);
  const stats = {
    total: orders.length,
    pending: orders.filter(o => o.status === "pending").length,
    delivered: orders.filter(o => o.status === "delivered").length,
    revenue: orders.filter(o => o.status === "delivered").reduce((s, o) => s + (o.price || 0), 0),
  };

  const copyLink = (id) => {
    const url = `${window.location.href.split("#")[0]}#product-${id}`;
    navigator.clipboard?.writeText(url).then(() => showN("📋 تم نسخ الرابط!")).catch(() => showN("#product-" + id));
  };

  return (
    <div className="adm">
      {notif && <div className="notif">{notif}</div>}
      <div className="adm-nav">
        <div className="logo">{STORE_NAME} — Admin</div>
        <div className="adm-tabs">
          <button className={`atab ${tab === "orders" ? "on" : ""}`}
            onClick={() => { setTab("orders"); setForm(null); }}>
            📦 الطلبات {orders.length > 0 && `(${orders.length})`}
          </button>
          <button className={`atab ${tab === "products" ? "on" : ""}`}
            onClick={() => { setTab("products"); setForm(null); }}>
            🛍️ المنتجات ({products.length})
          </button>
          <button className="atab atab-red" onClick={onLogout}>خروج</button>
        </div>
      </div>

      <div className="adm-body">
        {/* Stats */}
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-n">{stats.total}</div><div className="stat-l">📦 إجمالي الطلبات</div></div>
          <div className="stat-card"><div className="stat-n" style={{ color: "var(--warn)" }}>{stats.pending}</div><div className="stat-l">⏳ قيد الانتظار</div></div>
          <div className="stat-card"><div className="stat-n" style={{ color: "var(--green)" }}>{stats.delivered}</div><div className="stat-l">✅ تم التوصيل</div></div>
          <div className="stat-card"><div className="stat-n" style={{ fontSize: 20 }}>{fp2(stats.revenue)}</div><div className="stat-l">💰 المبيعات (MRU)</div></div>
          <div className="stat-card"><div className="stat-n">{products.filter(p => p.active !== false).length}</div><div className="stat-l">🛍️ منتجات نشطة</div></div>
        </div>

        {/* ── ORDERS ── */}
        {tab === "orders" && (
          <div className="twrap">
            <div className="thd">
              <div className="tttl">📋 الطلبات الواردة</div>
              <div className="ftabs">
                {[["all", "الكل"], ["pending", "انتظار"], ["delivered", "موصّل"]].map(([v, l]) => (
                  <button key={v} className={`ftab ${filter === v ? "on" : ""}`}
                    onClick={() => setFilter(v)}>{l}</button>
                ))}
              </div>
            </div>
            {filtered.length === 0 ? (
              <div className="empty-state"><div className="empty-icon">📭</div>لا توجد طلبات</div>
            ) : (
              <div className="tscroll">
                <table>
                  <thead><tr>
                    <th>#</th><th>الاسم</th><th>الهاتف</th><th>العنوان</th>
                    <th>المنتج</th><th>السعر</th><th>التاريخ</th><th>الحالة</th><th>إجراءات</th>
                  </tr></thead>
                  <tbody>
                    {filtered.map((o, i) => (
                      <tr key={o.id}>
                        <td style={{ color: "var(--mut)" }}>{i + 1}</td>
                        <td style={{ fontWeight: 700 }}>{o.customer}</td>
                        <td style={{ direction: "ltr", textAlign: "right" }}>{o.phone}</td>
                        <td>{o.address}</td>
                        <td style={{ color: "var(--g)", fontWeight: 600 }}>{o.product}</td>
                        <td style={{ color: "var(--g)", fontWeight: 700, whiteSpace: "nowrap" }}>{fp2(o.price)} MRU</td>
                        <td style={{ color: "var(--mut)", fontSize: 11, whiteSpace: "nowrap" }}>
                          {new Date(o.createdAt).toLocaleDateString("ar", { day: "2-digit", month: "short", year: "numeric" })}
                        </td>
                        <td>
                          <span className={`sbdg ${o.status === "delivered" ? "sd" : "sp"}`}>
                            {o.status === "delivered" ? "✅ موصّل" : "⏳ انتظار"}
                          </span>
                        </td>
                        <td style={{ whiteSpace: "nowrap" }}>
                          {o.status === "pending"
                            ? <button className="tact td" onClick={() => updateStatus(o.id, "delivered")}>✅ وُصِّل</button>
                            : <button className="tact tp" onClick={() => updateStatus(o.id, "pending")}>🔄 إرجاع</button>}
                          {confirmId === o.id ? (
                            <>
                              <button className="tact tx" style={{ background: "rgba(230,57,70,0.35)", fontWeight: 900 }}
                                onClick={() => delOrder(o.id)}>تأكيد</button>
                              <button className="tact" style={{ background: "rgba(255,255,255,0.06)", color: "var(--mut)" }}
                                onClick={() => setConfirmId(null)}>لا</button>
                            </>
                          ) : (
                            <button className="tact tx" onClick={() => setConfirmId(o.id)}>🗑️ حذف</button>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* ── PRODUCTS ── */}
        {tab === "products" && (
          <>
            {form ? (
              <ProductForm
                initial={form === "add" ? null : form}
                currentProducts={products}
                onSave={updated => {
                  onProductsChange(updated);
                  setForm(null);
                  showN(form === "add" ? "✅ تم نشر المنتج في المتجر!" : "✅ تم حفظ التعديلات");
                }}
                onCancel={() => setForm(null)}
              />
            ) : (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
                  <div style={{ color: "var(--mut)", fontSize: 14 }}>
                    {products.length} منتج إجمالاً | {products.filter(p => p.active !== false).length} نشط
                  </div>
                  <button className="btn-save" onClick={() => setForm("add")}>
                    ➕ إضافة منتج جديد
                  </button>
                </div>

                {products.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-icon">📦</div>
                    <div>لا توجد منتجات بعد</div>
                    <button className="btn-save" style={{ marginTop: 16 }} onClick={() => setForm("add")}>
                      ➕ أضف منتجك الأول
                    </button>
                  </div>
                ) : (
                  <div className="adm-pgrid">
                    {products.map(p => {
                      const cat = catInfo(p.category);
                      const stockPct = Math.min(100, Math.round((p.stock / 20) * 100));
                      return (
                        <div className="adm-pcard" key={p.id} style={{ opacity: p.active !== false ? 1 : 0.55 }}>
                          <div style={{ position: "relative" }}>
                            <img src={p.images?.[0]} alt={p.name} className="adm-pimg" />
                            {p.active === false && (
                              <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <span style={{ color: "#fff", fontWeight: 800, fontSize: 13, background: "rgba(230,57,70,0.85)", padding: "5px 14px", borderRadius: 20 }}>⛔ مخفي</span>
                              </div>
                            )}
                            {/* image count badge */}
                            {p.images?.length > 1 && (
                              <div style={{ position: "absolute", bottom: 8, left: 8, background: "rgba(0,0,0,0.7)", color: "#fff", padding: "2px 8px", borderRadius: 10, fontSize: 11 }}>
                                🖼️ {p.images.length} صور
                              </div>
                            )}
                          </div>
                          <div className="adm-pbody">
                            <div className="adm-pcat">{cat.icon} {cat.label}</div>
                            <div className="adm-pname">{p.name}</div>
                            <div className="adm-pprice">{fPrice(p.price)}</div>

                            {/* Stock */}
                            <div className="sc-row">
                              <button className="sc-btn" onClick={() => updateStock(p.id, -1)}>−</button>
                              <div style={{ textAlign: "center" }}>
                                <div className="sc-val">{p.stock}</div>
                                <div style={{ fontSize: 9, color: "var(--mut)" }}>كمية</div>
                              </div>
                              <button className="sc-btn" onClick={() => updateStock(p.id, 1)}>+</button>
                              <div className="sc-bar">
                                <div className="sc-fill" style={{
                                  width: `${stockPct}%`,
                                  background: p.stock > 7 ? "var(--green)" : p.stock > 3 ? "var(--warn)" : "var(--red)"
                                }} />
                              </div>
                              <div style={{ fontSize: 10, color: p.stock > 7 ? "var(--green)" : p.stock > 3 ? "var(--warn)" : "var(--red)", fontWeight: 700 }}>
                                {p.stock > 7 ? "✅" : p.stock > 3 ? "⚡" : "⚠️"}
                              </div>
                            </div>

                            <div className="adm-acts">
                              <button className="abtn ab-edit" onClick={() => setForm(p)}>✏️ تعديل</button>
                              <button className={`abtn ${p.active !== false ? "ab-toggle-on" : "ab-toggle-off"}`}
                                onClick={() => toggleActive(p.id)}>
                                {p.active !== false ? "⛔ إخفاء" : "✅ إظهار"}
                              </button>
                              {confirmPid === p.id ? (
                                <>
                                  <button className="abtn" style={{ background: "rgba(230,57,70,0.35)", color: "#fff", fontWeight: 900 }}
                                    onClick={() => delProduct(p.id)}>تأكيد الحذف</button>
                                  <button className="abtn" style={{ background: "rgba(255,255,255,0.06)", color: "var(--mut)" }}
                                    onClick={() => setConfirmPid(null)}>إلغاء</button>
                                </>
                              ) : (
                                <button className="abtn ab-del" onClick={() => setConfirmPid(p.id)}>🗑️ حذف</button>
                              )}
                            </div>

                            {/* Ad link */}
                            <div className="adm-link-row">
                              <div className="adm-link">🔗 رابط الإعلان: #product-{p.id}</div>
                              <button className="copy-btn" onClick={() => copyLink(p.id)}>📋 نسخ</button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════
function LoginPage({ onLogin }) {
  const [pass, setPass] = React.useState("");
  const [err, setErr] = React.useState("");
  const go = () => { if (pass === ADMIN_PASS) onLogin(); else setErr("كلمة المرور غير صحيحة"); };
  return (
    <div className="login-pg">
      <div className="login-card">
        <div className="login-logo">{STORE_NAME}</div>
        <div className="login-sub">🔐 لوحة تحكم المدير</div>
        {err && <div className="lerr">{err}</div>}
        <label className="flbl">كلمة المرور</label>
        <input className="fin" type="password" placeholder="أدخل كلمة المرور"
          value={pass} onChange={e => { setPass(e.target.value); setErr(""); }}
          onKeyDown={e => e.key === "Enter" && go()}
          style={{ textAlign: "center", marginBottom: 18 }} />
        <button className="fsub" onClick={go}>دخول</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ROOT APP — كل الـ state هنا ومشترك بين المتجر والأدمن
// ══════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = React.useState("store");
  const [products, setProducts] = React.useState([]);
  const [orders, setOrders] = React.useState([]);
  const [selectedProduct, setSelectedProduct] = React.useState(null);
  const [orderProduct, setOrderProduct] = React.useState(null);
  const [adminAuth, setAdminAuth] = React.useState(false);
  const logoClicks = React.useRef(0);
  const logoTimer = React.useRef(null);

  React.useEffect(() => {
    setProducts(lsGet(PRODUCTS_KEY) || DEFAULT_PRODUCTS);
    setOrders(lsGet(ORDERS_KEY) || []);
  }, []);

  React.useEffect(() => {
    const hash = window.location.hash;
    if (hash === "#admin") { setView("login"); return; }
    if (hash.startsWith("#product-")) {
      const id = Number(hash.replace("#product-", ""));
      const all = lsGet(PRODUCTS_KEY) || DEFAULT_PRODUCTS;
      const found = all.find(x => x.id === id);
      if (found) { setSelectedProduct(found); setView("product"); }
    }
  }, []);

  const handleLogoClick = () => {
    logoClicks.current += 1;
    clearTimeout(logoTimer.current);
    logoTimer.current = setTimeout(() => { logoClicks.current = 0; }, 3000);
    if (logoClicks.current >= 5) { logoClicks.current = 0; setView("login"); }
  };

  const goStore = () => { setView("store"); setSelectedProduct(null); setOrderProduct(null); };
  const viewProduct = (p) => { setSelectedProduct(p); setView("product"); window.scrollTo(0, 0); };

  // ── دوال مشتركة لتحديث البيانات فوراً ──
  const saveProducts = (updated) => {
    setProducts(updated);      // فوري — يُحدَّث الـ UI مباشرة
    lsSet(PRODUCTS_KEY, updated); // في الخلفية بدون انتظار
  };
  const saveOrders  = (updated) => { setOrders(updated);  lsSet(ORDERS_KEY, updated);   };

  return (
    <>
      <style>{CSS}</style>

      {view === "store" && (
        <StoreHome products={products} onViewProduct={viewProduct} onLogoClick={handleLogoClick} />
      )}

      {view === "product" && selectedProduct && (
        <>
          <nav className="nav">
            <div className="logo" onClick={handleLogoClick}>{STORE_NAME}</div>
            <button onClick={goStore} style={{ background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.25)", color: "var(--g)", padding: "6px 14px", borderRadius: 20, cursor: "pointer", fontFamily: "Cairo", fontSize: 13 }}>
              ← المتجر
            </button>
          </nav>
          <ProductDetail product={selectedProduct} onBack={goStore} onOrder={p => setOrderProduct(p)} />
          {orderProduct && (
            <OrderModal
              product={orderProduct}
              onClose={() => setOrderProduct(null)}
              onSuccess={goStore}
              onOrderPlaced={newOrder => saveOrders([newOrder, ...orders])}
            />
          )}
        </>
      )}

      {view === "login" && (
        <LoginPage onLogin={() => { setAdminAuth(true); setView("admin"); }} />
      )}

      {view === "admin" && adminAuth && (
        <AdminDashboard
          products={products}
          orders={orders}
          onProductsChange={saveProducts}
          onOrdersChange={saveOrders}
          onLogout={() => { setAdminAuth(false); setView("store"); }}
        />
      )}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
